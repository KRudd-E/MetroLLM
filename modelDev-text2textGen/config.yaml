train:
  data:
    dir: "data/3-formatted/t2tGen/archive/t2tGen_train_short.csv"
    task_col: "task"
    input_col: "input"
    output_col: "output"
    max_seq_length: 256

  model:
    name: "google/flan-t5-large"
    max_input_length: 256
    max_target_length: 128
    save_dir: "./checkpoints"

  training_args:
    output_dir: "modelDev-text2textGen/results"
    lr: 3e-4
    batch_size: 4
    eval_batch_size: 4
    weight_decay: 0.01
    save_total_limit: 3
    epochs: 5
    metric_for_best_model: "eval_rouge1"
    log_path: "modelDev-text2textGen/results/logs.csv"



eval:
  data:
    dir: "data/3-formatted/t2tGen/archive/t2tGen_test.csv"
    task_col: "task"
    input_col: "input"
    output_col: "output"
    max_seq_length: 256

  model:
    dir: "modelDev-text2textGen/results/checkpoint-67320"
    max_input_length: 256
    max_target_length: 128
    load_dir: "./checkpoints"

  eval_args:
    metric: "rouge"
    batch_size: 8
    output_dir: "modelDev-text2textGen/results/final_results.json"
