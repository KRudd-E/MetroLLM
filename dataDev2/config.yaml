    output_file: /data/textGen.csv

    use_applicationsDB: True
    use_companiesDB: False
    use_definitionsDB: False

    debug: False


# ****** Text Classification ****** #
run_textClass: False
textClass:
    data_path: /data/applicationsDB/new/
    output_file: /data/textClass.csv

    use_applicationsDB: True
    use_companiesDB: False
    use_definitionsDB: False

    debug: False


sleep: 1










