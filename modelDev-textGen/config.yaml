# config.yaml
# Containing arguments for training and evaluation processes.

config_dir: /gpfs01/home/efykr2/MetroLLM/modelDev-textGen/config.yaml

#**- Train -**#
train:
  data:
    dir: "/gpfs01/home/efykr2/MetroLLM/data/3-formatted/textGen/textGen_train.csv"
    task_col: "task"
    input_col: "input"
    output_col: "output"
    max_seq_length: 2048
    test_size: 0.1

  model:
    name: "deepseek-ai/DeepSeek-R1-Distill-Qwen-14B"
    max_input_length: 2048
    max_target_length: 2048

  lora:
    rank: 16
    alpha: 32
    dropout: 0.1
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

  training_args:
    output_dir: "/gpfs01/home/efykr2/MetroLLM/modelDev-textGen/results/"

    do_train: true
    do_eval: true
    evaluation_strategy: "steps"  
    eval_steps: 25
    save_strategy: "steps"
    save_steps: 25
    save_total_limit: 8
    logging_strategy: "steps"
    logging_steps: 10
    logging_nan_inf_filter: true

    learning_rate: 1e-4
    per_device_train_batch_size: 1
    per_device_eval_batch_size: 1
    gradient_accumulation_steps: 16
    eval_accumulation_steps: 1
    num_train_epochs: 2
    max_steps: -1     
    warmup_ratio: 0.1
    weight_decay: 0.01
    max_grad_norm: 1.0
    lr_scheduler_type: "linear"    

    bf16: true
    gradient_checkpointing: true
    dataloader_pin_memory: true     
    group_by_length: true

    load_best_model_at_end: True
    metric_for_best_model: "eval_loss"
    greater_is_better: False

    label_smoothing_factor: 0.0

    report_to: ["none"]
    remove_unused_columns: true
    ddp_find_unused_parameters: false
    run_name: "deepseek-lora-finetune"
    
    
    early_stopping_patience: 5
    log_training_steps:   True
    

#**- Evaluation -**#
eval:
  data:
    dir: "/gpfs01/home/efykr2/MetroLLM/data/3-formatted/textGen/textGen_test.csv"
    task_col: "task"
    input_col: "input"
    output_col: "output"
    max_seq_length: 2048

  model:
    name: "deepseek-ai/DeepSeek-R1-Distill-Qwen-14B"
    dir: "/gpfs01/home/efykr2/MetroLLM/modelDev-textGen/results/v1/checkpoint-750/" 


  mmlu_args:
    batch_size: 8
    max_length: 1024
    output_dir: "/gpfs01/home/efykr2/MetroLLM/modelDev-textGen/results/v1/mmlu_results.json"

  test_set_args:
    batch_size: 8

  task_args:
    batch_size: 8


    


