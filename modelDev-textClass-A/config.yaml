
train:
  data:
    source_dir: /data/3-formatted/textClass/textClass-applicationsDB.csv
    input_col: Task
    class_no: 21
  
  model:
    name: bert-base-uncased
    
  training_args:
    output_dir                  : modelDev-textClass-A/results/
    learning_rate               : 2e-5
    per_device_train_batch_size : 16
    per_device_eval_batch_size  : 32
    num_train_epochs            : 3
    warmup_ratio                : 0.1
    eval_strategy               : "epoch"
    save_strategy               : "epoch"
    save_total_limit            : 3
    metric_for_best_model       : "f1_micro"
    load_best_model_at_end      : True
    logging_dir                 : modelDev-textClass-A/results/
    logging_steps               : 50
    push_to_hub                 : False
    log_dir                     : modelDev-textClass-A/results/logs.csv


eval:
  data: 
    class_no: 21