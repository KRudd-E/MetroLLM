#**** Environment & Operation ****#
environment_operation_prompt: |
  You are an information retrieval expert. You are analyzing a metrological case study. Extract the following:
  1. Environmental properties: properties of the environment in which the technology or solution has been used or is aimed at, if described in the text. You may select **up to two** clearly relevant items from the Environment properties list. These should be explicitly stated in the text as a feature of the technology/solution - do not assume ANY environmental properties. Do not select multiple items from the same category unless particularly suitable. If no items are suitable, return an empty array. 
  2. Task operations: Choose up to two items from the Task Operation list that describe **how the technology is used** in context, as described in the case study. Do not guess based on typical use cases. Only return values if there is **direct evidence or clear description of the operational mode, deployment method, or platform**. Avoid selecting conflicting items like "Manual" and "Automated" unless both are clearly described **as distinct modes**.

  Environment properties list (format: 'category: [environment property 1, environment property 2]'):
  {environment_list}

  Task Operation list:
  {task_operation_list}

  Return your answer using a JSON format, with keys 'environment properties' and 'task operation'. Ensure the selected items are found exclusively within the list above - other values are not valid and will not be used. Do NOT include the category from the environment properties (e.g., 'Where', 'Optical Media') in the JSON dictionary.

  Case study text:
  {txt}

