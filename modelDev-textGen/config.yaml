# NB: add '/' at the start of directories for ensured directory formatting

config_dir: /gpfs01/home/efykr2/MetroLLM/modelDev-textGen/config.yaml

train:
  data:
    dir: "/gpfs01/home/efykr2/MetroLLM/data/3-formatted/textGen/textGen_train.csv"
    task_col: "task"
    input_col: "input"
    output_col: "output"
    max_seq_length: 2048

  model:
    name: "deepseek-ai/DeepSeek-R1-Distill-Qwen-14B"
    max_input_length: 2048
    max_target_length: 2048

  # LoRA Configuration
  lora:
    rank: 16                # LoRA rank (lower = fewer parameters, faster training)
    alpha: 32               # LoRA scaling parameter (typically 2x rank)
    dropout: 0.1            # LoRA dropout for regularization
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]  # Modules to apply LoRA to

  training_args:
    output_dir: "/gpfs01/home/efykr2/MetroLLM/modelDev-textGen/results/"

    # Core loop
    do_train: true
    do_eval: true
    evaluation_strategy: "steps"  
    eval_steps: 50
    save_strategy: "steps"
    save_steps: 50
    save_total_limit: 8
    logging_strategy: "steps"
    logging_steps: 50
    logging_nan_inf_filter: true

    # Training setup
    learning_rate: 1e-4
    per_device_train_batch_size: 1
    per_device_eval_batch_size: 1
    gradient_accumulation_steps: 16
    eval_accumulation_steps: 1
    num_train_epochs: 2
    max_steps: -1     
    warmup_ratio: 0.1
    weight_decay: 0.01
    max_grad_norm: 1.0
    lr_scheduler_type: "linear"    

    # Precision / memory
    bf16: true
    gradient_checkpointing: true
    dataloader_pin_memory: true     
    group_by_length: true

    # # Generation for metrics
    # predict_with_generate: true
    # generation_max_new_tokens: 128
    # generation_num_beams: 1

    # Model saving / selection
    load_best_model_at_end: True
    metric_for_best_model: "eval_loss"
    greater_is_better: False

    label_smoothing_factor: 0.0

    # Misc
    report_to: ["none"]              # or ["tensorboard"] if you want TB logs
    remove_unused_columns: true      # let HF drop unused dataset cols
    ddp_find_unused_parameters: false
    run_name: "deepseek-lora-finetune"
    
    
    log_training_steps:   True
    

eval:
  data:
    dir: "/data/3-formatted/textGen/textGen_test.csv"
    task_col: "task"
    input_col: "input"
    output_col: "output"
    max_seq_length: 2048

  model:
    dir: "/modelDev-text2textGen/results/V2/checkpoint-1680/"
    max_input_length: 2048
    max_target_length: 2048

  eval_args:
    metric: "rouge"
    batch_size: 8
    output_dir: "/modelDev-text2textGen/results/V2/checkpoint-1680/eval_results.json"
